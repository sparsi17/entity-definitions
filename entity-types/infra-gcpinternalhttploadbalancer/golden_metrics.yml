backendRequestsRate:
  title: Backend Requests per second
  unit: REQUESTS_PER_SECOND
  queries:
    gcp:
      select: rate(sum(gcp.loadbalancing.https.internal.backend_request_count), 1 minute) / 60
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: rate(sum(`https.internal.BackendRequests`), 1 minute) / 60
      from: GcpInternalHttpLoadBalancerSample
      eventId: entityGuid
      eventName: entityName
backendLatencyMs:
  title: Backend Latency
  unit: MS
  queries:
    gcp:
      select: percentile(gcp.loadbalancing.https.internal.backend_latencies, 95)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: percentile(`https.internal.BackendLatencies`, 95)
      from: GcpInternalHttpLoadBalancerSample
      eventId: entityGuid
      eventName: entityName
