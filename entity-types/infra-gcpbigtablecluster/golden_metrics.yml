cpuLoad:
  title: CPU load (%)
  unit: PERCENTAGE
  queries:
    gcp:
      select: average(gcp.bigtable.cluster.cpu_load) * 100
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: average(cluster.CpuLoad)
      from: GcpBigtableClusterSample
      eventId: entityGuid
      eventName: entityName
