executionTime:
  title: Query execution time
  unit: MS
  queries:
    gcp:
      select: sum(`gcp.cloudsql.database.postgresql.insights.aggregate.execution_time`) / 1000
      from: Metric
      eventId: entity.guid
      eventName: entity.name
queryLatencyP95:
  title: Query latency (p95)
  unit: MS
  queries:
    gcp:
      select: percentile(`gcp.cloudsql.database.postgresql.insights.aggregate.latencies`, 95) / 1000
      from: Metric
      eventId: entity.guid
      eventName: entity.name
lockTime:
  title: Query lock time
  unit: MS
  queries:
    gcp:
      select: sum(`gcp.cloudsql.database.postgresql.insights.aggregate.lock_time`) / 1000
      from: Metric
      eventId: entity.guid
      eventName: entity.name
ioTime:
  title: Query IO time
  unit: MS
  queries:
    gcp:
      select: sum(`gcp.cloudsql.database.postgresql.insights.aggregate.io_time`) / 1000
      from: Metric
      eventId: entity.guid
      eventName: entity.name
