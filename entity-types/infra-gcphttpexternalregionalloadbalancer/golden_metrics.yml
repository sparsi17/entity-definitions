backendRequestsRate:
  title: Backend Requests per second
  unit: REQUESTS_PER_SECOND
  queries:
    gcp:
      select: rate(sum(gcp.loadbalancing.https.external.regional.backend_request_count), 1 minute) / 60
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: rate(sum(`https.external.regional.BackendRequests`), 1 minute) / 60
      from: GcpHttpExternalRegionalLoadBalancerSample
      eventId: entityGuid
      eventName: entityName
backendLatencyMs:
  title: Backend Latency p95 (ms)
  unit: MS
  queries:
    gcp:
      select: percentile(gcp.loadbalancing.https.external.regional.backend_latencies, 95)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: percentile(`https.external.regional.BackendLatencies`, 95)
      from: GcpHttpExternalRegionalLoadBalancerSample
      eventId: entityGuid
      eventName: entityName
