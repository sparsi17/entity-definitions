domain: INFRA
type: IBMMQ_MANAGER

synthesis:
  rules:
    # nri-mq rules: identity targetName:qmgr.
    - ruleName: infra_ibmmq_manager_nri_1
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_qmgr
      tags:
        clusterName:
        instrumentation.provider:

    - ruleName: infra_ibmmq_manager_nri_2
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_channel
      tags:
        clusterName:
        instrumentation.provider:

    - ruleName: infra_ibmmq_manager_nri_3
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_subscription
      tags:
        clusterName:
        instrumentation.provider:

    # OpenTelemetry rule (Prometheus receiver): identity keyed on host.id (== target.name in OTel data).
    # target.name is the fallback when host.id is absent (see *_fallback); mutually exclusive via
    # host.id present true/false, so a queue manager is never synthesized twice.
    - ruleName: infra_ibmmq_manager_otel
      compositeIdentifier:
        separator: ":"
        attributes:
          - host.id
          - qmgr
      encodeIdentifierInGUID: true
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_qmgr
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
        - attribute: qmgr
          present: true
        - attribute: queue
          present: false
        - attribute: host.id
          present: true
      tags:
        qmgr:
        host.id:
        target.name:
        cluster.name:
          entityTagName: clusterName
        otel.library.name:
          entityTagName: instrumentation.name
        instrumentation.provider:
        server.address:
          ttl: P1D
        host.name:
          ttl: P1D
        k8s.pod.name:
          ttl: P1D
        k8s.node.name:
          ttl: P1D
        k8s.pod.uid:
          ttl: P1D
        k8s.namespace.name:
          ttl: P1D

    # Backup metric rule: host.id absent, fall back to target.name for identity.
    - ruleName: infra_ibmmq_manager_otel_fallback
      compositeIdentifier:
        separator: ":"
        attributes:
          - target.name
          - qmgr
      encodeIdentifierInGUID: true
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_qmgr
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
        - attribute: qmgr
          present: true
        - attribute: queue
          present: false
        - attribute: host.id
          present: false
        - attribute: target.name
          present: true
      tags:
        qmgr:
        target.name:
        host.id:
        cluster.name:
          entityTagName: clusterName
        otel.library.name:
          entityTagName: instrumentation.name
        instrumentation.provider:
        server.address:
          ttl: P1D
        host.name:
          ttl: P1D
        k8s.pod.name:
          ttl: P1D
        k8s.node.name:
          ttl: P1D
        k8s.pod.uid:
          ttl: P1D
        k8s.namespace.name:
          ttl: P1D

    # OpenTelemetry Log rule: attaches OTel Collector filelog logs to the queue manager entity
    # (without it they land on the HOST). Same host.id:qmgr identity as the metric rule; queue
    # absent keeps queue-scoped logs off the manager.
    - ruleName: infra_ibmmq_manager_otel_logs
      compositeIdentifier:
        separator: ":"
        attributes:
          - host.id
          - qmgr
      encodeIdentifierInGUID: true
      name: qmgr
      conditions:
        - attribute: eventType
          value: Log
        - attribute: newrelic.source
          value: api.logs.otlp
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: host.id
          present: true
        - attribute: qmgr
          present: true
        - attribute: queue
          present: false
      tags:
        qmgr:
        host.id:
        target.name:
        cluster.name:
          entityTagName: clusterName
        instrumentation.provider:
        otel.library.name:
          entityTagName: instrumentation.name
        server.address:
          ttl: P1D
        host.name:
          ttl: P1D
        k8s.pod.name:
          ttl: P1D
        k8s.node.name:
          ttl: P1D
        k8s.pod.uid:
          ttl: P1D
        k8s.namespace.name:
          ttl: P1D

    # Backup log rule: host.id absent, fall back to target.name for identity.
    - ruleName: infra_ibmmq_manager_otel_logs_fallback
      compositeIdentifier:
        separator: ":"
        attributes:
          - target.name
          - qmgr
      encodeIdentifierInGUID: true
      name: qmgr
      conditions:
        - attribute: eventType
          value: Log
        - attribute: newrelic.source
          value: api.logs.otlp
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: host.id
          present: false
        - attribute: target.name
          present: true
        - attribute: qmgr
          present: true
        - attribute: queue
          present: false
      tags:
        qmgr:
        target.name:
        host.id:
        cluster.name:
          entityTagName: clusterName
        instrumentation.provider:
        otel.library.name:
          entityTagName: instrumentation.name
        server.address:
          ttl: P1D
        host.name:
          ttl: P1D
        k8s.pod.name:
          ttl: P1D
        k8s.node.name:
          ttl: P1D
        k8s.pod.uid:
          ttl: P1D
        k8s.namespace.name:
          ttl: P1D

goldenTags:
  - qmgr

dashboardTemplates:
  newRelic:
    template: newrelic_dashboard.json
  opentelemetry:
    template: opentelemetry_dashboard.json

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
