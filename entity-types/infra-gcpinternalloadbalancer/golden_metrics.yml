Sent:
  title: Sent bytes
  unit: BYTES
  queries:
    gcp:
      select: sum(gcp.loadbalancing.l3.internal.egress_bytes_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: sum(`l3.internal.EgressBytes`)
      from: GcpInternalLoadBalancerSample
      eventId: entityGuid
      eventName: entityName
Received:
  title: Received bytes
  unit: BYTES
  queries:
    gcp:
      select: sum(gcp.loadbalancing.l3.internal.ingress_bytes_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: sum(`l3.internal.IngressBytes`)
      from: GcpInternalLoadBalancerSample
      eventId: entityGuid
      eventName: entityName
latency:
  title: Latency p95 (s)
  unit: SECONDS
  queries:
    gcp:
      select: percentile(gcp.loadbalancing.l3.internal.rtt_latencies, 95) / 1000
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: percentile(`l3.internal.RttLatencies`, 95) / 1000
      from: GcpInternalLoadBalancerSample
      eventId: entityGuid
      eventName: entityName
