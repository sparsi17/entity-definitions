storageUsage:
  title: Storage Usage
  unit: BYTES
  queries:
    gcp:
      select: latest(gcp.alloydb.cluster.storage.usage)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
backupLastBackupTime:
  title: Last Backup Time
  unit: TIMESTAMP
  queries:
    gcp:
      select: latest(gcp.alloydb.cluster.last_backup_timestamp)/1000
      from: Metric
      eventId: entity.guid
      eventName: entity.name
