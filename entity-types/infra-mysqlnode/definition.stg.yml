domain: INFRA
type: MYSQLNODE

synthesis:
  rules:
    # opentelemetry - metrics (OTel Collector mysqlreceiver)
    # Loose matching is intentional: any mysql.* metric from an OTel provider.
    # The otel.library.name check was deliberately removed upstream, do not re-add it here.
    - ruleName: infra_mysqlnode_mysql_instance_endpoint
      identifier: mysql.instance.endpoint # server.address:server.port
      name: mysql.instance.endpoint
      encodeIdentifierInGUID: true
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: mysql.
        - attribute: instrumentation.provider
          value: opentelemetry
      tags:
        # Environment resource attributes
        host.type:
        cloud.provider:
        cloud.account.id:
        cloud.region:
        # server.address/server.port are required by the MYSQLNODE relationship
        # candidate so native-APM apps (datastore distributed-tracing spans) can link here.
        server.address:
        server.port:
        otel.library.name:
          entityTagName: instrumentation.name

    # opentelemetry - query performance logs (OTel-contrib mysqlreceiver)
    # The otel.library.name condition is REQUIRED on log rules: MSSQL and other DB
    # receivers also emit db.server.* log events, so it disambiguates the source.
    - ruleName: infra_mysqlnode_mysql_instance_endpoint_logs
      identifier: mysql.instance.endpoint
      name: mysql.instance.endpoint
      encodeIdentifierInGUID: true
      conditions:
        - attribute: eventType
          value: Log
        - attribute: event.name
          prefix: db.server.
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/mysqlreceiver
      tags:
        server.address:
        server.port:
        db.namespace:
          entityTagName: database.name
        instrumentation.provider:
          entityTagName: instrumentation.provider
        otel.library.name:
          entityTagName: instrumentation.name

    # opentelemetry - query performance logs (newrelic-forks nrmysqlreceiver)
    - ruleName: infra_mysqlnode_mysql_instance_endpoint_logs_nrfork
      identifier: mysql.instance.endpoint
      name: mysql.instance.endpoint
      encodeIdentifierInGUID: true
      conditions:
        - attribute: eventType
          value: Log
        - attribute: event.name
          prefix: db.server.
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/newrelic-forks/opentelemetry-collector-contrib/receiver/nrmysqlreceiver
      tags:
        server.address:
        server.port:
        db.namespace:
          entityTagName: database.name
        instrumentation.provider:
          entityTagName: instrumentation.provider
        otel.library.name:
          entityTagName: instrumentation.name

    # nri-mysql / MysqlSample
    - ruleName: infra_mysqlnode_entityId
      identifier: entityId
      name: entityName
      legacyFeatures:
        useNonStandardAttributes: true
        overrideGuidType: true
      prefixedTags:
        label.:
          ttl: PT4H
      conditions:
        - attribute: event_type
          value: 'MysqlSample'
      tags:
        integrationName:
          ttl: P1D
        integrationVersion:
          ttl: P1D
        reportingAgent:
          ttl: P1D

  tags:
    # For OpenTelemetry
    telemetry.sdk.name:
      entityTagName: instrumentation.provider

goldenTags:
- mysql.port
- mysql.version
- mysql.edition
- mysql.hostname
- mysql.clusterNodeType

configuration:
  entityExpirationTime: DAILY
  alertable: true

dashboardTemplates:
  # This should match the entity created from the ohi in the infra pipeline
  newRelic:
    template: newrelic_dashboard.json
  # otel receiver
  opentelemetry:
    template: opentelemetry_dashboard.stg.json

ownership:
  primaryOwner:
    teamName: "Database Integrations"
