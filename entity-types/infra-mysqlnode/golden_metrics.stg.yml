# Golden metrics for INFRA-MYSQLNODE.
#
# Each metric provides a `newRelic` query (nri-mysql OHI / MysqlSample) and, where a
# reliable equivalent exists, an `opentelemetry` query (OTel Collector mysqlreceiver,
# FROM Metric).
#
# OTel note: MySQL receiver counters are cumulative & monotonic; NRDB cannot currently
# apply value functions (rate/derivative) to them cleanly. So OTel golden metrics are
# limited to gauge-style (non-monotonic) metrics using latest(). Counter-based golden
# metrics stay newRelic-only; their OTel counterparts live on the dashboard instead.
#
# "gated" = the OTel metric is disabled by default in the receiver and must be enabled
# in the collector config (metrics: <name>: enabled: true) for the query to return data.

queriesPerSecond:
  title: Queries per second
  unit: OPERATIONS_PER_SECOND
  queries:
    newRelic:
      select: average(query.queriesPerSecond)
      from: MysqlSample
      eventId: entityGuid
      eventName: entityName
    # Currently, we cannot match value functions for OpenTelemetry cumulative metrics.
    # opentelemetry:

slowQueriesPerMinute:
  title: Slow queries per minute
  unit: REQUESTS_PER_MINUTE
  queries:
    newRelic:
      select: average(query.slowQueriesPerSecond) * 60
      from: MysqlSample
      eventId: entityGuid
      eventName: entityName
    # Currently, we cannot match value functions for OpenTelemetry cumulative metrics.
    # opentelemetry:

connectionsPerSecond:
  title: Connections per second
  unit: COUNT
  queries:
    newRelic:
      select: average(net.connectionsPerSecond)
      from: MysqlSample
      eventId: entityGuid
      eventName: entityName
    # Currently, we cannot match value functions for OpenTelemetry cumulative metrics.
    # opentelemetry:

queriesQuestions:
  title: Query questions
  unit: OPERATIONS_PER_SECOND
  queries:
    newRelic:
      select: average(`query.questionsPerSecond`)
      from: MysqlSample
      eventId: entityGuid
      eventName: entityName
    # Currently, we cannot match value functions for OpenTelemetry cumulative metrics.
    # opentelemetry:

threadsConnected:
  title: Threads connected
  unit: COUNT
  queries:
    newRelic:
      select: latest(net.threadsConnected)
      from: MysqlSample
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: latest(mysql.threads)
      from: Metric
      where: kind = 'connected'

threadsRunning:
  title: Threads running
  unit: COUNT
  queries:
    newRelic:
      select: latest(net.threadsRunning)
      from: MysqlSample
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: latest(mysql.threads)
      from: Metric
      where: kind = 'running'

maxUsedConnections:
  title: Max used connections
  unit: COUNT
  queries:
    newRelic:
      select: latest(net.maxUsedConnections)
      from: MysqlSample
      eventId: entityGuid
      eventName: entityName
    # gated: mysql.max_used_connections is disabled by default in the receiver.
    opentelemetry:
      select: latest(mysql.max_used_connections)
      from: Metric

bufferPoolDataPages:
  title: Buffer pool data pages
  unit: COUNT
  queries:
    newRelic:
      select: latest(db.innodb.bufferPoolPagesData)
      from: MysqlSample
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: latest(mysql.buffer_pool.pages)
      from: Metric
      where: kind = 'data'

# OpenTelemetry-only: the nri-mysql OHI does not report an equivalent buffer-pool
# byte-usage attribute, so no newRelic query is provided.
bufferPoolUsageBytes:
  title: Buffer pool usage
  unit: BYTES
  queries:
    opentelemetry:
      select: latest(mysql.buffer_pool.usage)
      from: Metric

# OpenTelemetry-only: the nri-mysql OHI does not report server uptime in MysqlSample.
uptime:
  title: Uptime
  unit: SECONDS
  queries:
    opentelemetry:
      select: latest(mysql.uptime)
      from: Metric
