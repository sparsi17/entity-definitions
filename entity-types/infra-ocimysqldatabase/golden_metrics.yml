cpuUtilization:
  title: CPU Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(oci.mysql.database.cpuutilization)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
activeConnections:
  title: Active Connections
  unit: COUNT
  queries:
    oci:
      select: max(oci.mysql.database.active.connections)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
statementLatency:
  title: Statement Latency
  unit: MS
  queries:
    oci:
      select: average(oci.mysql.database.statement.latency)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
memoryUtilization:
  title: Memory Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(oci.mysql.database.memory.utilization)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
