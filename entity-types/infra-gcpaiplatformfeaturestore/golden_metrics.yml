storedBytes:
  title: Stored Bytes
  unit: BYTES
  queries:
    gcp:
      select: average(gcp.aiplatform.featurestore.storage.stored_bytes)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: average(featurestore.online_serving.RequestBytes)
      from: GcpVertexAiFeaturestoreSample
      eventId: entityGuid
      eventName: entityName
cpuLoad:
  title: CPU Load
  unit: PERCENTAGE
  queries:
    gcp:
      select: average(gcp.aiplatform.featurestore.cpu_load) * 100
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: average(featurestore.CpuLoad)
      from: GcpVertexAiFeaturestoreSample
      eventId: entityGuid
      eventName: entityName
latency:
  title: Latency p95 (ms)
  unit: MS
  queries:
    gcp:
      select: percentile(gcp.aiplatform.featurestore.online_serving.latencies, 95)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: percentile(featurestore.online_serving.Latencies, 95)
      from: GcpVertexAiFeaturestoreSample
      eventId: entityGuid
      eventName: entityName
