readUnits:
  title: Read Units
  unit: COUNT
  queries:
    oci:
      select: sum(oci.nosql.read.units)
writeUnits:
  title: Write Units
  unit: COUNT
  queries:
    oci:
      select: sum(oci.nosql.write.units)
readThrottleCount:
  title: Read Throttle Count
  unit: COUNT
  queries:
    oci:
      select: sum(oci.nosql.read.throttle.count)
writeThrottleCount:
  title: Write Throttle Count
  unit: COUNT
  queries:
    oci:
      select: sum(oci.nosql.write.throttle.count)
