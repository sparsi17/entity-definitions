connectionsActive:
  title: Connections active
  unit: COUNT
  queries:
    gcp:
      select: average(gcp.memcache.node.active_connections)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: average(node.ActiveConnections)
      from: GcpMemcacheMemcacheNodeSample
      eventId: entityGuid
      eventName: entityName
cpuUtilization:
  title: CPU utilization (%)
  unit: PERCENTAGE
  queries:
    gcp:
      select: average(gcp.memcache.node.cpu.utilization)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: average(node.cpu.Utilization)
      from: GcpMemcacheMemcacheNodeSample
      eventId: entityGuid
      eventName: entityName
hitRatio:
  title: Hit ratio (%)
  unit: PERCENTAGE
  queries:
