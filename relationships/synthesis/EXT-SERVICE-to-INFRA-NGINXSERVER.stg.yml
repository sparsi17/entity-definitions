relationships:
  - name: otelExtServiceCallsNginxServerByUpstreamLabelStg
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "Metric" ]
      - attribute: newrelic.source
        anyOf: [ "api.metrics.otlp" ]
      - attribute: entity.type
        anyOf: [ "SERVICE" ]
      - attribute: tags.nginx.upstream.deployment.name
        present: true
    relationship:
      expires: PT75M
      relationshipType: CALLS
      source:
        extractGuid:
          attribute: entity.guid
      target:
        lookupGuid:
          candidateCategory: NGINXSERVER
          fields:
            - field: deploymentName
              attribute: tags.nginx.upstream.deployment.name
  - name: otelExtServiceCallsNginxServerByAddressStg
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: ["Metric"]
      - attribute: newrelic.source
        anyOf: ["api.metrics.otlp"]
      - attribute: entity.type
        anyOf: ["SERVICE"]
      - attribute: tags.nginx.upstream.deployment.name
        present: false
      - attribute: server.address
        present: true
      - attribute: metricName
        startsWith: "http.client."
    relationship:
      expires: PT75M
      relationshipType: CALLS
      source:
        extractGuid:
          attribute: entity.guid
      target:
        lookupGuid:
          candidateCategory: NGINXSERVER
          fields:
            - field: serverAddress
              attribute: server.address
