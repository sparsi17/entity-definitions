category: NGINXSERVER
lookups:
  # Path A — deployment-name lookup
  - entityTypes:
      - domain: INFRA
        type: NGINXSERVER
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: ["nginx.deployment.name"]
          field: deploymentName
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: NO_OP

  # Path B — address-only lookup
  - entityTypes:
      - domain: INFRA
        type: NGINXSERVER
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: ["nginx.server.address"]
          field: serverAddress
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: NO_OP
