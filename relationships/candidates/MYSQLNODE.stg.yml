category: MYSQLNODE
lookups:
  # Index OTel-synthesized MYSQLNODE entities by server.address + server.port so that
  # native-APM applications (datastore distributed-tracing spans carrying
  # server.address/server.port) can look them up and form a CALLS relationship.
  # Consumed by APM-APPLICATION-to-INFRA-MYSQLNODE.stg.yml. Requires the
  # server.address / server.port tags added to the MYSQLNODE OTel synthesis rule
  # in definition.stg.yml.
  - entityTypes:
      - domain: INFRA
        type: MYSQLNODE
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: ["server.address"]
          field: serverAddress
        - tagKeys: ["server.port"]
          field: serverPort
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: NO_OP
